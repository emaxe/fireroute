version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-firegate}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-firegate}
      POSTGRES_DB: ${DB_NAME:-firegate}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-firegate}"]
      interval: 5s
      timeout: 5s
      retries: 5

  gateway:
    build: ./gateway
    restart: unless-stopped
    env_file: .env
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

  admin:
    build: ./admin
    restart: unless-stopped
    ports:
      - "3001:80"
    depends_on:
      - gateway

volumes:
  pgdata:
